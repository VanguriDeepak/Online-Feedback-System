<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8R2PzEfV17nQh1R0Q6Q4VY5q5f5Q0mA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #eff6ff;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --accent: #f59e0b;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #06b6d4;
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --surface-hover: #f3f4f6;
            --border-light: #e5e7eb;
            --border-medium: #d1d5db;
            --text-main: #111827;
            --text-secondary: #4b5563;
            --text-tertiary: #9ca3af;
            --shadow: 0 24px 40px rgba(17, 24, 39, 0.1);
            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;
            --text-3xl: 1.875rem;
            --text-4xl: 2.25rem;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at 10% -5%, rgba(59, 130, 246, 0.14), transparent 42%), var(--bg);
            color: var(--text-main);
            display: grid;
            place-items: center;
            padding: 18px;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            z-index: 0;
            filter: blur(4px);
            opacity: 0.65;
        }

        body::before {
            width: 320px;
            height: 320px;
            background: rgba(59, 130, 246, 0.08);
            top: -90px;
            right: -80px;
        }

        body::after {
            width: 260px;
            height: 260px;
            background: rgba(139, 92, 246, 0.1);
            left: -65px;
            bottom: -75px;
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: min(470px, 100%);
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 22px;
            box-shadow: var(--shadow);
            padding: 28px;
            animation: rise 0.65s ease;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(1.6rem, 4vw, 2.1rem);
        }

        .brand p {
            margin: 8px 0 0;
            color: var(--text-secondary);
            font-size: 0.96rem;
        }

        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 14px;
            min-height: 10px;
        }

        .alert {
            border-radius: 11px;
            border: 1px solid transparent;
            padding: 11px 13px;
            font-size: 0.92rem;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #b91c1c;
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.12);
            border-color: rgba(16, 185, 129, 0.32);
            color: #047857;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .input-wrap {
            display: grid;
            grid-template-columns: 40px 1fr 40px;
            align-items: center;
            border: 1px solid var(--border-light);
            border-radius: 13px;
            overflow: hidden;
            background: #ffffff;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .input-wrap:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
        }

        .input-icon,
        .toggle-password {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.92rem;
        }

        .toggle-password {
            border: none;
            background: transparent;
            cursor: pointer;
            height: 100%;
        }

        .input-wrap input {
            border: none;
            background: transparent;
            color: var(--text-main);
            padding: 12px 6px;
            font-size: 0.96rem;
            width: 100%;
            outline: none;
        }

        .input-wrap input::placeholder {
            color: var(--text-tertiary);
        }

        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0 18px;
            gap: 12px;
            color: var(--text-secondary);
            font-size: 0.92rem;
        }

        .remember-row label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-row input[type="checkbox"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 13px;
            padding: 13px 16px;
            font-size: 0.97rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            color: #ffffff;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.32);
            animation: pulse 2.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 34px rgba(37, 99, 235, 0.42);
        }

        .submit-btn:disabled {
            opacity: 0.75;
            cursor: not-allowed;
            animation: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.34);
            border-top-color: #ffffff;
            border-radius: 50%;
            display: none;
            animation: spin 0.7s linear infinite;
        }

        .submit-btn.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 20px 16px;
                border-radius: 16px;
            }

            .remember-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <main class="login-card" aria-label="Admin login form">
        <header class="brand">
            <h1>Admin Access</h1>
            <p>Sign in to manage feedback and analytics.</p>
        </header>

        <div id="messages" class="messages" aria-live="polite">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert {{ 'success' if category == 'success' else 'error' }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>

        <form id="adminLoginForm" method="post" action="{{ url_for('admin_login') }}" novalidate>
            <div class="field">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <span class="input-icon" aria-hidden="true"><i class="fa-regular fa-user"></i></span>
                    <input id="username" name="username" type="text" autocomplete="username" placeholder="Enter username" required>
                    <span></span>
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <span class="input-icon" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
                    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter password" required>
                    <button class="toggle-password" type="button" id="togglePassword" aria-label="Show password">
                        <i id="togglePasswordIcon" class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="remember-row">
                <label for="rememberMe">
                    <input id="rememberMe" name="remember_me" type="checkbox" value="1">
                    Remember me
                </label>
            </div>

            <button id="submitBtn" class="submit-btn" type="submit">
                <span class="spinner" aria-hidden="true"></span>
                <span class="btn-text">Login to Dashboard</span>
            </button>
        </form>

        <a class="back-link" href="{{ url_for('home') }}">Back to Home</a>
    </main>

    <script>
        (function () {
            const form = document.getElementById("adminLoginForm");
            const usernameInput = document.getElementById("username");
            const passwordInput = document.getElementById("password");
            const rememberInput = document.getElementById("rememberMe");
            const submitBtn = document.getElementById("submitBtn");
            const togglePasswordBtn = document.getElementById("togglePassword");
            const togglePasswordIcon = document.getElementById("togglePasswordIcon");
            const messagesBox = document.getElementById("messages");

            function showMessage(type, text) {
                const alert = document.createElement("div");
                alert.className = `alert ${type === "success" ? "success" : "error"}`;
                alert.textContent = text;
                messagesBox.replaceChildren(alert);
            }

            togglePasswordBtn.addEventListener("click", () => {
                const showing = passwordInput.type === "text";
                passwordInput.type = showing ? "password" : "text";
                togglePasswordIcon.className = showing ? "fa-regular fa-eye" : "fa-regular fa-eye-slash";
                togglePasswordBtn.setAttribute("aria-label", showing ? "Show password" : "Hide password");
            });

            form.addEventListener("submit", async (event) => {
                event.preventDefault();
                messagesBox.replaceChildren();

                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                const remember = rememberInput.checked;

                if (!username || !password) {
                    showMessage("error", "Username and password are required.");
                    if (!username) {
                        usernameInput.focus();
                    } else {
                        passwordInput.focus();
                    }
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.classList.add("loading");

                try {
                    const response = await fetch(form.action, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Accept": "application/json",
                            "X-Requested-With": "XMLHttpRequest"
                        },
                        body: JSON.stringify({
                            username,
                            password,
                            remember_me: remember
                        })
                    });

                    const result = await response.json();
                    if (!response.ok || !result.success) {
                        throw new Error(result.error || "Login failed.");
                    }

                    showMessage("success", "Login successful. Redirecting...");
                    setTimeout(() => {
                        window.location.href = "{{ url_for('admin_dashboard') }}";
                    }, 550);
                } catch (error) {
                    showMessage("error", error instanceof Error ? error.message : "Unable to login.");
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove("loading");
                }
            });
        })();
    </script>
</body>
</html>
